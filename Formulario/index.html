<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="png-transparent-profile-logo-computer-icons-user-user-blue-heroes-logo-thumbnail.png">
</head>
<body>
    
<header>
    <h2 class="Logo">Logo</h2>
    <nav class="navegador">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contactos</a>
        <button class="Loguiador-push">Iniciar sesión
        </button>
    </nav>
</header>

<div class="borde">
    <div class="formulario-caja login">
        <h2>Iniciar sesión</h2>
        <form action="#">
            <div class="entrada-caja">
                <span class="icono-0"></span>
                <input type="email" required>
                <label>Email</label>
            </div>
            <div class="entrada-caja">
                <span class="icono-1"></span>
                <input type="password" required>
                <label>Contraseña</label>
            </div>
            <div class="recordar-olvidar">
                <label><input type="checkbox">
                Recordarme</label>
                <a href="#">¿Has olvidado tu contraseña?</a>
            </div>
            <button type="submit" class="boton">Acceder</button>
            <div class="Registrarse">
                <p>¿No tienes una cuenta?
                    <a href="#" class="Registrarse-link">Registrarse
                    </a>
                </p>
            </div>
        </form>
    </div>
</div>

<script type="module" src="ios-mail.svg"></script>
</body>

</html>
