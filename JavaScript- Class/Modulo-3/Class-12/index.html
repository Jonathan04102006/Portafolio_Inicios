<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRABAJAR con JAVASCRIPT, PHP y MySQL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&amp;display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section>
        <fieldset>
            <legend>Cargar</legend>
            <div class="listaCargar"></div>
        </fieldset>

        <fieldset class="insertar">
            <legend>insertar</legend>
            <label for="titulo">Titulo de clasificacion:</label>
            <input id="titulo" placeholder="Titulo" autofocus/>
            <label for="producto">producto:</label>
            <input id="producto" placeholder="producto"/>
            <div class="listainsertar"></div>
            <button class="btinsertar">Insertar</button>
        </fieldset>

        <fieldset class="editar">
            <legend>editar</legend>
            <label for="tituloEditar">Titulo de clasificacion:</label>
            <input id="tituloEditar" placeholder="Titulo"/>
            <label for="productoEditar">producto:</label>
            <input id="productoEditar" placeholder="producto"/>
            <div class="listaeditar"></div>
            <button class="bteditar">Editar</button>
        </fieldset>
    </section>
    <script src="script.js"></script>
</body>
</html>
