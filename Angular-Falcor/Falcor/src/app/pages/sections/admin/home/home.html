<div>
  <h1 class="title">Bienvenido a Falcor (Home)</h1>
</div>
<div class="test-container">
  <h2>Prueba de Input Automático</h2>
  <p>Intenta escribir en MAYÚSCULAS aquí abajo:</p>

  <form [formGroup]="formPrueba">
    <div class="input-box">
      <label>Usuario:</label>
      <input 
        type="text" 
        formControlName="usuario" 
        (input)="transformarMinusculas($event)"
        placeholder="Escribe algo...">
    </div>
  </form>

  <div class="resultado">
    <strong>Valor real en el formulario:</strong> 
    {{ formPrueba.value.usuario }}
  </div>
</div>
