<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falcor Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- PANEL IZQUIERDO -->
    <div class="left-panel">

        <div class="brand">
            <div class="falcon-icon">
                <img src="img_Falcor_Logo/image.png" alt="Falcor Logo" class="logo-img">
            </div>
            <h1 class="logo-text">FALCOR</h1>
        </div>

        <h2 class="subtitle">
            Software inteligente para restaurantes modernos
        </h2>

        <ul class="features">
            <li>✔ Control en tiempo real</li>
            <li>✔ Órdenes sincronizadas</li>
            <li>✔ Gestión multi-rol</li>
        </ul>

        <p class="tagline">
            Diseñado para velocidad.<br>
            Construido para precisión.
        </p>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel">

        <h2 class="welcome">Bienvenido de nuevo 🪶</h2>
        <p class="description">
            Administra tu restaurante sin fricción.
        </p>

        <form class="login-form" onsubmit="return validarFormulario()">

            <label class="label">Usuario</label>
            <input type="text" class="input usuario">

            <label class="label">Contraseña</label>
            <input type="password" class="input password">

            <p class="error-message"></p>

            <button type="submit" class="btn-login">
                Iniciar sesión
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
