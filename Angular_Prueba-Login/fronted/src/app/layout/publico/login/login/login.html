<form [formGroup]="myForm" (ngSubmit)="submitFormulario()" style="max-width: 350px; margin: auto; padding: 20px;">
    <h2>Iniciar Sesión Púlico</h2>

    <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input formControlName="usuario" [class.is-invalid]="f.usuario.required && f.usuario.touched" type="text" class="form-control" placeholder="Ingresa tu usuario">
        <div id="validationServeUsernameFeedback" class="invalid-feedback">Usuario obligatorio</div>
    </div>

    <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input formControlName="password" type="password" class="form-control" placeholder="Ingresa tu contraseña">
    </div>
    <div class="mb-3">
        <button class="btn btn-success">Ingresar</button>
    </div>
</form>
