<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera web</title>
</head>
<body>

    
    <h2>Imagenes en HTML</h2>
    <img src="imagenes/koala.jpg" alt="Koala" title="Koala" width="250px" height="200px">

    <!--<img> es para incrustar una imagen-->

    <!--<alt> es para que muestra el nombre de la imagen al no aparecer-->

    <!--<title> es para al pasar el puntero sobre la imagen muestre el titulo de la foto o imagen-->

    <!--<width> es para editar la anchura de la imagen o foto-->

    <!--<height> es para editar la altura de la imagen o foto-->

</body>
</html>
