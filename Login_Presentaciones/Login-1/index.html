<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="main-wrapper">
  <div class="bg-image-container">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop" alt="Bakground" class="bg-img">
  </div>

  <div class="content-overlay">
    <div class="glass-card">
      <div class="form-header">
        <div class="icon-circle">
          <span class="material-icons">Falcor</span>
        </div>
        <h1>Bienvenido</h1>
        <p>Ingresa tus credenciales de gestión</p>
      </div>

      <form class="login-form">
        <div class="input-box">
          <input type="text" required placeholder="Usuario">
        </div>
        <div class="input-box">
          <input type="password" required placeholder="Contraseña">
        </div>

        <button type="submit" class="btn-login">Iniciar Sesión</button>
      </form>

      <div class="divider">
        <span>o</span>
      </div>

      <button class="btn-google">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
        Acceder con Google
      </button>

      <div class="form-footer">
        <p>¿Eres nuevo? <a href="#" class="signup-link">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</div>
<script src="index.js"></script>
</body>
</html>
